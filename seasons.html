<title>Busy & Slow Seasons — Steak Teppei</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F2F7;--card:#FFF;--border:rgba(0,0,0,.08);--border-md:rgba(0,0,0,.14);
  --text:#000;--text-sub:#3C3C43;--text-hint:#8E8E93;
  --surface:#FFF;
  --radius:16px;--radius-sm:10px;
  --orange:#E8440A;--orange-light:#fff2ed;
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E;--card:#2C2C2E;--border:rgba(255,255,255,.1);--border-md:rgba(255,255,255,.18);
    --text:#FFF;--text-sub:#EBEBF5;--text-hint:#8E8E93;
    --surface:#2C2C2E;--orange-light:#2a1206;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:'Noto Sans JP','Noto Sans SC',-apple-system,'Helvetica Neue',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}

.sn-header{background:var(--orange);color:#fff;padding:calc(var(--safe-top)+12px) 16px 14px;position:sticky;top:0;z-index:100;}
.sn-header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.sn-back{background:rgba(255,255,255,.22);border:none;border-radius:20px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;padding:5px 13px;font-family:inherit;display:flex;align-items:center;gap:4px;}
.sn-back:active{opacity:.7;}
.sn-title{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.sn-sub{font-size:11px;opacity:.75;}

.lang-bar{display:flex;gap:6px;padding:10px 13px;background:var(--bg);border-bottom:.5px solid var(--border-md);}
.lang-btn{padding:5px 14px;border-radius:20px;border:.5px solid var(--border-md);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-hint);font-family:inherit;}
.lang-btn.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}

.view-bar{display:flex;padding:10px 13px 0;background:var(--bg);}
.view-btn{flex:1;padding:8px 0;border:.5px solid var(--border-md);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-hint);font-family:inherit;}
.view-btn:first-child{border-radius:10px 0 0 10px;}
.view-btn:last-child{border-radius:0 10px 10px 0;}
.view-btn.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}

.year-tabs{display:flex;gap:8px;padding:10px 13px;background:var(--bg);}
.year-btn{flex:1;padding:9px 4px;border-radius:var(--radius-sm);border:.5px solid var(--border-md);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;color:var(--text-hint);text-align:center;font-family:inherit;}
.year-btn.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}

.filter-wrap{display:flex;gap:6px;padding:0 13px 10px;flex-wrap:wrap;background:var(--bg);}
.filter-btn{padding:5px 11px;border-radius:20px;border:.5px solid var(--border-md);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;color:var(--text-hint);font-family:inherit;}
.filter-btn.active-us{background:#e8f0fe;color:#1a56db;border-color:#1a56db;}
.filter-btn.active-jp{background:#fce7f3;color:#be185d;border-color:#be185d;}
.filter-btn.active-hi{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}
.filter-btn.active-ca{background:#fef3c7;color:#92400e;border-color:#d97706;}
.filter-btn.active-slow{background:#f1f5f9;color:#475569;border-color:#94a3b8;}
.filter-btn.active-hidoe{background:#e0f2fe;color:#0369a1;border-color:#0369a1;}
.filter-btn.active-all{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}

.legend{display:flex;flex-wrap:wrap;gap:6px;padding:0 13px 10px;background:var(--bg);}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-hint);}
.legend-bar{width:4px;height:14px;border-radius:2px;}

.content{padding:10px 13px calc(var(--safe-bottom)+48px);}
.month-head{font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.08em;padding:14px 0 6px;border-bottom:.5px solid var(--border);margin-bottom:6px;}
.month-head:first-child{padding-top:4px;}

.period-card{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.period-card.busy-us{border-left:3px solid #1a56db;}
.period-card.busy-jp{border-left:3px solid #be185d;}
.period-card.busy-hi{border-left:3px solid var(--orange);}
.period-card.busy-ca{border-left:3px solid #d97706;}
.period-card.slow{border-left:3px solid #94a3b8;opacity:.85;}
.period-card.busy-hidoe{border-left:3px solid #0369a1;}
.period-card.now{box-shadow:0 0 0 1.5px var(--orange);}
.period-left{flex:1;min-width:0;}
.period-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
.period-date{font-size:11px;color:var(--text-hint);margin-top:3px;}
.period-tip{font-size:11px;color:var(--text-sub);margin-top:4px;line-height:1.5;}
.period-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.region-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:10px;white-space:nowrap;}
.badge-us{background:#e8f0fe;color:#1a56db;}
.badge-jp{background:#fce7f3;color:#be185d;}
.badge-hi{background:var(--orange-light);color:var(--orange);}
.badge-ca{background:#fef3c7;color:#92400e;}
.badge-slow{background:#f1f5f9;color:#475569;}
.badge-hidoe{background:#e0f2fe;color:#0369a1;}
.now-badge{font-size:9px;font-weight:700;background:var(--red);color:#fff;padding:3px 7px;border-radius:10px;}
.no-results{text-align:center;padding:32px 0;font-size:13px;color:var(--text-hint);}

#cal-view{display:none;padding:10px 13px calc(var(--safe-bottom)+48px);}
.cal-month{margin-bottom:20px;}
.cal-month-title{font-size:14px;font-weight:700;color:var(--text);padding:10px 0 8px;border-bottom:.5px solid var(--border);margin-bottom:8px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--text-hint);padding:4px 0;text-transform:uppercase;}
.cal-day{min-height:44px;border-radius:8px;border:.5px solid transparent;padding:3px 4px;background:var(--card);cursor:default;}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day.today{border-color:var(--orange)!important;}
.cal-day-num{font-size:11px;font-weight:600;color:var(--text);line-height:1;}
.cal-day.today .cal-day-num{color:var(--orange);font-weight:800;}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.cal-popup-wrap{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;align-items:flex-end;justify-content:center;}
.cal-popup-wrap.open{display:flex;}
.cal-popup{background:var(--surface);border-radius:20px 20px 0 0;padding:16px 16px calc(var(--safe-bottom)+16px);width:100%;max-width:600px;box-shadow:0 -4px 24px rgba(0,0,0,.15);border:.5px solid var(--border);}
.cal-popup-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text);}
.cal-popup-date{font-size:11px;color:var(--text-hint);margin-bottom:6px;}
.cal-popup-tip{font-size:13px;color:var(--text-sub);line-height:1.6;}
.cal-popup-close{float:right;background:none;border:none;font-size:20px;color:var(--text-hint);cursor:pointer;margin-top:-2px;}
</style>
</head>

<div class="legend">

  <div class="legend-item"><div class="legend-bar" style="background:#0369a1;"></div><span id="leg-hidoe">HIDOE</span></div>
</div>

<!-- LIST VIEW -->
<div class="content" id="list-view"></div>

<!-- CALENDAR VIEW -->
<div id="cal-view"></div>

function getPeriods() {
  if (currentLang==='ja') return PERIODS_JA;
  if (currentLang==='zh') return PERIODS_ZH;
  return PERIODS_EN;
}

var REGION_BADGES = { us:'badge-us', jp:'badge-jp', hi:'badge-hi', ca:'badge-ca', hidoe:'badge-hidoe', slow:'badge-slow' };
var CARD_CLASSES  = { us:'busy-us', jp:'busy-jp', hi:'busy-hi', ca:'busy-ca', hidoe:'busy-hidoe', slow:'slow' };
var DOT_COLORS    = { us:'#1a56db', jp:'#be185d', hi:'#E8440A', ca:'#d97706', hidoe:'#0369a1', slow:'#94a3b8' };

function setLang(l) {
  currentLang = l;
  ['en','ja','zh'].forEach(function(x){ document.getElementById('lb-'+x).className='lang-btn'+(x===l?' active':''); });
  applyI18n();
  render();
}

function applyI18n() {
  var t = I18N[currentLang];
  document.getElementById('page-title').textContent = t.pageTitle;
  document.getElementById('vb-list').textContent = t.viewList;
  document.getElementById('vb-cal').textContent  = t.viewCal;
  document.getElementById('f-all').textContent   = t.allFilter;
  document.getElementById('f-slow').textContent  = t.slowFilter;
  document.getElementById('leg-us').textContent  = t.legUs;
  document.getElementById('leg-jp').textContent  = t.legJp;
  document.getElementById('leg-hi').textContent  = t.legHi;
  document.getElementById('leg-ca').textContent  = t.legCa;
  document.getElementById('leg-slow').textContent= t.legSlow;
  document.getElementById('leg-hidoe').textContent=t.legHidoe;
}

function setView(v) {
  currentView = v;
  document.getElementById('vb-list').className = 'view-btn'+(v==='list'?' active':'');
  document.getElementById('vb-cal').className  = 'view-btn'+(v==='cal'?' active':'');
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  document.getElementById('cal-view').style.display  = v==='cal'?'block':'none';
  // Hide filter in cal view
  document.getElementById('filter-wrap').style.display = v==='list'?'flex':'none';
  render();
}

function setYear(yr) {
  currentYear = yr;
  ['2026','2027','all'].forEach(function(y){
    var b = document.getElementById('yr-'+y);
    if(b) b.className='year-btn'+(y===yr?' active':'');
  });
  render();
}

function setFilter(f) {
  currentFilter = f;
  ['all','us','jp','hi','ca','slow','hidoe'].forEach(function(x){
    var b = document.getElementById('f-'+x); if(!b) return;
    b.className = 'filter-btn'+(x===f?' active-'+f:'');
  });
  render();
}

function fmtDateRange(s, e) {
  var ds=new Date(s+'T12:00:00'), de=new Date(e+'T12:00:00');
  var ms=I18N[currentLang].months;
  if (currentLang==='en') {
    if(ds.getFullYear()===de.getFullYear()&&ds.getMonth()===de.getMonth())
      return ms[ds.getMonth()]+' '+ds.getDate()+'–'+de.getDate()+', '+ds.getFullYear();
    if(ds.getFullYear()===de.getFullYear())
      return ms[ds.getMonth()]+' '+ds.getDate()+' – '+ms[de.getMonth()]+' '+de.getDate()+', '+ds.getFullYear();
    return ms[ds.getMonth()]+' '+ds.getDate()+', '+ds.getFullYear()+' – '+ms[de.getMonth()]+' '+de.getDate()+', '+de.getFullYear();
  }
  if (currentLang==='ja') {
    var sy=ds.getFullYear(), ey=de.getFullYear();
    if(sy===ey) return sy+'年 '+ms[ds.getMonth()]+(ds.getDate())+'日'+(s===e?'':' 〜 '+ms[de.getMonth()]+de.getDate()+'日');
    return sy+'年'+ms[ds.getMonth()]+ds.getDate()+'日 〜 '+ey+'年'+ms[de.getMonth()]+de.getDate()+'日';
  }
  // zh
  var sy=ds.getFullYear(), ey=de.getFullYear();
  if(sy===ey) return sy+'年'+ms[ds.getMonth()]+ds.getDate()+'日'+(s===e?'':'至'+ms[de.getMonth()]+de.getDate()+'日');
  return sy+'年'+ms[ds.getMonth()]+ds.getDate()+'日至'+ey+'年'+ms[de.getMonth()]+de.getDate()+'日';
}

function render() {
  if (currentView==='list') renderList();
  else renderCalendar();
}

function renderList() {
  var now=new Date(); now.setHours(0,0,0,0);
  var t=I18N[currentLang];
  var periods=getPeriods();
  var filtered=periods.filter(function(p){
    if(currentFilter!=='all'&&p.region!==currentFilter) return false;
    if(currentYear==='2026') return p.start<='2026-12-31'&&p.end>='2026-01-01';
    if(currentYear==='2027') return p.start<='2027-12-31'&&p.end>='2027-01-01';
    return true;
  });
  filtered.sort(function(a,b){
    var an=new Date(a.start+'T12:00:00')<=now&&new Date(a.end+'T12:00:00')>=now;
    var bn=new Date(b.start+'T12:00:00')<=now&&new Date(b.end+'T12:00:00')>=now;
    if(an&&!bn) return -1; if(!an&&bn) return 1;
    return a.start<b.start?-1:a.start>b.start?1:0;
  });
  if(!filtered.length){ document.getElementById('list-view').innerHTML='<div class="no-results">'+t.noResults+'</div>'; return; }
  var nowItems=filtered.filter(function(p){ return new Date(p.start+'T12:00:00')<=now&&new Date(p.end+'T12:00:00')>=now; });
  var rest=filtered.filter(function(p){ return !(new Date(p.start+'T12:00:00')<=now&&new Date(p.end+'T12:00:00')>=now); });
  var html='';
  if(nowItems.length){ html+='<div class="month-head" style="color:var(--orange);">'+t.nowSection+'</div>'; nowItems.forEach(function(p){html+=renderCard(p,now,t);}); }
  var groups={}, groupOrder=[];
  rest.forEach(function(p){
    var d=new Date(p.start+'T12:00:00');
    var key=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1);
    var label=I18N[currentLang].months[d.getMonth()]+' '+d.getFullYear();
    if(!groups[key]){groups[key]={label:label,items:[]};groupOrder.push(key);}
    groups[key].items.push(p);
  });
  groupOrder.forEach(function(key){ html+='<div class="month-head">'+groups[key].label+'</div>'; groups[key].items.forEach(function(p){html+=renderCard(p,now,t);}); });
  document.getElementById('list-view').innerHTML=html;
}

function renderCard(p,now,t) {
  var isNow=new Date(p.start+'T12:00:00')<=now&&new Date(p.end+'T12:00:00')>=now;
  var regionLabel=t.regions[p.region]||p.region;
  var icon=p.region==='us'?'🇺🇸':p.region==='jp'?'🇯🇵':p.region==='hi'?'🌺':p.region==='ca'?'🇨🇦':p.region==='hidoe'?'🏫':'📅';
  return '<div class="period-card '+(CARD_CLASSES[p.region]||'')+(isNow?' now':'')+'">'+
    '<div class="period-left">'+
    '<div class="period-name">'+p.name+'</div>'+
    '<div class="period-date">'+fmtDateRange(p.start,p.end)+'</div>'+
    (p.tip?'<div class="period-tip">'+p.tip+'</div>':'')+
    '</div><div class="period-right">'+
    '<span class="region-badge '+(REGION_BADGES[p.region]||'')+'">'+icon+' '+regionLabel+'</span>'+
    (isNow?'<span class="now-badge">'+t.today+'</span>':'')+
    '</div></div>';
}

function renderCalendar() {
  var periods=getPeriods();
  var now=new Date(); now.setHours(0,0,0,0);
  var years=currentYear==='all'?[2026,2027]:[parseInt(currentYear)];
  var html='';
  years.forEach(function(yr){
    for(var mo=0;mo<12;mo++){
      var firstDay=new Date(yr,mo,1);
      var lastDay=new Date(yr,mo+1,0);
      var t=I18N[currentLang];
      html+='<div class="cal-month"><div class="cal-month-title">'+t.months[mo]+' '+yr+'</div>';
      html+='<div class="cal-grid">';
      t.dow.forEach(function(d){ html+='<div class="cal-dow">'+d+'</div>'; });
      // blank days
      for(var i=0;i<firstDay.getDay();i++) html+='<div class="cal-day empty"></div>';
      for(var day=1;day<=lastDay.getDate();day++){
        var date=new Date(yr,mo,day); date.setHours(0,0,0,0);
        var dateStr=yr+'-'+(mo<9?'0':'')+(mo+1)+'-'+(day<10?'0':'')+day;
        var isToday=date.getTime()===now.getTime();
        // find periods overlapping this day
        var dayPeriods=periods.filter(function(p){ return p.start<=dateStr&&p.end>=dateStr; });
        var classes='cal-day'+(isToday?' today':'');
        var dots='';
        var periodData=JSON.stringify(dayPeriods).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
        dayPeriods.forEach(function(p){
          dots+='<div class="cal-dot" style="background:'+( DOT_COLORS[p.region]||'#ccc')+'"></div>';
        });
        var onclick=dayPeriods.length?'showCalPopup('+JSON.stringify(dayPeriods[0].name)+','+JSON.stringify(fmtDateRange(dayPeriods[0].start,dayPeriods[0].end))+','+JSON.stringify(dayPeriods[0].tip||'')+')':'';
        html+='<div class="'+classes+'" '+(onclick?'onclick="'+onclick.replace(/"/g,'&quot;')+'" style="cursor:pointer;"':'')+'>';
        html+='<div class="cal-day-num">'+day+'</div>';
        if(dots) html+='<div class="cal-dots">'+dots+'</div>';
        html+='</div>';
      }
      html+='</div></div>';
    }
  });
  document.getElementById('cal-view').innerHTML=html;
}

function showCalPopup(name,date,tip) {
  document.getElementById('cal-popup-title').textContent=name;
  document.getElementById('cal-popup-date').textContent=date;
  document.getElementById('cal-popup-tip').textContent=tip;
  document.getElementById('cal-popup-wrap').classList.add('open');
}

// 4. Auto-detect language from URL param (set by chat app)
(function() {
  var params = new URLSearchParams(window.location.search);
  var lang = params.get('lang');
  if (lang && ['en','ja','zh'].includes(lang)) {
    currentLang = lang;
  }
})();

// init
applyI18n();
setView('list');
render();
</script>
