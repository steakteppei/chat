<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0f08">
<title>Chat Version History</title>
<style>
:root{--bg:#1a1410;--bg2:#150e08;--bg3:#2d1b0e;--border:#3d2510;--border2:#4a2e15;--accent:#8B4513;--gold:#f0c080;--text:#e8d4b8;--text3:#9a7a5a;--text4:#6b4a2a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans JP',sans-serif;padding:24px 16px 40px;}
h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.sub{font-size:11px;color:var(--text3);margin-bottom:24px;}
.entry{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.entry-header{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.ver{font-size:14px;font-weight:700;color:var(--gold);}
.date{font-size:11px;color:var(--text4);}
.latest{font-size:10px;background:var(--accent);color:white;padding:2px 8px;border-radius:10px;margin-left:auto;}
.desc{font-size:12px;color:var(--text3);line-height:1.6;}
a{display:inline-block;margin-top:20px;color:var(--accent);font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<h1>🥩 Chat Version History</h1>
<p class="sub">steakteppei.github.io/chat</p>

<script>
const HISTORY = [
  { ver:'1.4', date:'2026-04-12', desc:'Fix: Gemini 2.5 Flash-Lite thinkingBudget:0 to resolve translation failure' },
  { ver:'1.3', date:'2026-04-12', desc:'Fix: Gemini model name corrected to gemini-2.5-flash-lite (stable)' },
  { ver:'1.2', date:'2026-04-12', desc:'Switch image storage from Firebase Storage to Cloudinary (25GB free)' },
  { ver:'1.1', date:'2026-04-12', desc:'Add image upload + lightbox feature' },
  { ver:'1.0', date:'2026-04-12', desc:'Initial release: PIN login, Firebase Realtime DB, Gemini translation' },
];

const container = document.body;
HISTORY.forEach((e, i) => {
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `
    <div class="entry-header">
      <span class="ver">v${e.ver}</span>
      <span class="date">${e.date}</span>
      ${i === 0 ? '<span class="latest">Latest</span>' : ''}
    </div>
    <div class="desc">${e.desc}</div>
  `;
  container.appendChild(div);
});

const link = document.createElement('a');
link.href = './home-chat.html';
link.textContent = '← Back to Chat Home';
container.appendChild(link);
</script>
</body>
</html>
