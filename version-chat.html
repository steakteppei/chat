<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0f08">
<title>Chat Version History</title>
<style>
:root{--bg:#1a1410;--bg3:#2d1b0e;--border:#3d2510;--border2:#4a2e15;--accent:#8B4513;--gold:#f0c080;--text:#e8d4b8;--text3:#9a7a5a;--text4:#6b4a2a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans JP',sans-serif;padding:24px 16px 48px;max-width:480px;margin:0 auto;}
h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.sub{font-size:11px;color:var(--text3);margin-bottom:24px;}
.entry{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.entry-header{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.ver{font-size:14px;font-weight:700;color:var(--gold);}
.date{font-size:11px;color:var(--text4);}
.latest{font-size:10px;background:var(--accent);color:white;padding:2px 8px;border-radius:10px;margin-left:auto;}
.desc{font-size:12px;color:var(--text3);line-height:1.6;}
a.back{display:inline-block;margin-top:20px;color:var(--accent);font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<h1>🥩 Chat Version History</h1>
<p class="sub">steakteppei.github.io/chat</p>

<script>
const HISTORY = [
  { ver:'3.0', date:'2026-04-12', desc:'Fix B1: Service Worker cache overhaul — HTML never cached, static assets only, forced reload on SW update, updateViaCache:none' },
  { ver:'3.2', date:'2026-04-13', desc:'Fix: JS syntax error (escaped backtick in template literal) causing login PIN to break' },
  { ver:'3.1', date:'2026-04-12', desc:'B:all fixes, U:all UX, F3 pin, F4 reactions+detail, F5 reply, F9 bookmark, F10 typing, D:all design, A1 delete old msgs, A2 analytics' },
  { ver:'2.9', date:'2026-04-12', desc:'Fix: login PIN input broken due to duplicate editingKey declaration causing JS parse error' },
  { ver:'2.8', date:'2026-04-12', desc:'@mention highlight: blue pill for others, white-on-blue badge for self-mention + pulse animation on message wrap' },
  { ver:'2.7', date:'2026-04-12', desc:'Sending indicator, edit message, read avatars, online presence, web notifications, image instant send, iOS bottom fix, sign-out redesign, dark header, app icon' },
  { ver:'2.6', date:'2026-04-12', desc:'Fix: font size button now correctly changes message text size' },
  { ver:'2.5', date:'2026-04-12', desc:'Logo added, admin back-to-chat link, seasons.html redesigned + lang auto-detect from chat' },
  { ver:'2.4', date:'2026-04-12', desc:'Text size selector, seasons page link, admin panel link on login+chat, seasons.html multilingual calendar+list' },
  { ver:'2.3', date:'2026-04-12', desc:'Detailed update popup per language, Aki display name, iOS zoom fix on PIN screen' },
  { ver:'2.2', date:'2026-04-12', desc:'Ambiguity check: AI detects missing subject/object and shows clarification modal before sending (all languages)' },
  { ver:'2.1', date:'2026-04-12', desc:'Context-aware translation: last 5 messages sent to Gemini for accurate subject/object inference' },
  { ver:'2.0', date:'2026-04-12', desc:'First names only, admin panel (admin.html), dark mode, update notification popup per language' },
  { ver:'1.9', date:'2026-04-12', desc:'Features: past msg translation, delete(24h/admin), unread badge, date dividers, read receipts, image save, @mention, search, announcements' },
  { ver:'1.8', date:'2026-04-12', desc:'Redesign: iMessage-style UI + emoji picker (6 categories, 200+ emojis)' },
  { ver:'1.7', date:'2026-04-12', desc:'Move translation to Cloudflare Worker proxy (API key no longer exposed in code)' },
  { ver:'1.6', date:'2026-04-12', desc:'Fix: Switch translation model to gemini-2.5-flash (gemini-2.5-flash-lite not available on this API key)' },
  { ver:'1.5', date:'2026-04-12', desc:'Add force-update mechanism via Service Worker (network-first + auto reload)' },
  { ver:'1.4', date:'2026-04-12', desc:'Fix: Gemini 2.5 Flash-Lite thinkingBudget:0 to resolve translation failure' },
  { ver:'1.3', date:'2026-04-12', desc:'Fix: Gemini model name corrected to gemini-2.5-flash-lite (stable)' },
  { ver:'1.2', date:'2026-04-12', desc:'Switch image storage: Firebase Storage → Cloudinary (25GB free)' },
  { ver:'1.1', date:'2026-04-12', desc:'Add image upload + lightbox feature' },
  { ver:'1.0', date:'2026-04-12', desc:'Initial release: PIN login, Firebase Realtime DB, Gemini translation' },
];

HISTORY.forEach((e, i) => {
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `
    <div class="entry-header">
      <span class="ver">v${e.ver}</span>
      <span class="date">${e.date}</span>
      ${i === 0 ? '<span class="latest">Latest</span>' : ''}
    </div>
    <div class="desc">${e.desc}</div>`;
  document.body.appendChild(div);
});

const a = document.createElement('a');
a.className = 'back';
a.href = './home-chat.html';
a.textContent = '← Back';
document.body.appendChild(a);
</script>
</body>
</html>
