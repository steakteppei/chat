@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#252525;--border:rgba(255,255,255,.1);--text:#f0f0f0;--text-sub:#aaa;--text-hint:#666;--orange-light:#2a1206;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:-apple-system,'SF Pro Text',sans-serif;color:var(--text);}
body{padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);}
.cl-header{background:var(--orange);color:#fff;padding:16px 16px 18px;position:sticky;top:0;z-index:100;}
.cl-header-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.cl-back{background:rgba(255,255,255,.22);border:none;border-radius:20px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;padding:5px 13px;-webkit-tap-highlight-color:transparent;}
.cl-back:active{opacity:.7;}
.cl-title{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.cl-sub{font-size:11px;opacity:.75;}
.content{max-width:480px;margin:0 auto;padding:14px 13px 48px;}
.ver-card{background:var(--card);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.ver-card.latest{border:1.5px solid var(--orange);}
.ver-hero{background:var(--orange);color:#fff;padding:16px 16px 14px;display:flex;align-items:center;justify-content:space-between;}
.ver-hero-icon{font-size:30px;}
.ver-hero-right{text-align:right;}
.ver-hero-label{font-size:10px;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.ver-hero-num{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.ver-hero-date{font-size:11px;opacity:.75;margin-top:1px;}
.ver-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;}
.ver-num{font-size:15px;font-weight:800;color:var(--text);}
.ver-date-label{font-size:11px;color:var(--text-hint);}
.ver-items{border-top:.5px solid var(--border);padding:2px 0 4px;}
.ver-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;}
.ver-item-icon{width:28px;height:28px;background:var(--orange-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;margin-top:2px;}
.ver-item-text{font-size:13px;color:var(--text-sub);line-height:1.5;flex:1;padding-top:4px;}
.cl-footer{text-align:center;font-size:11px;color:var(--text-hint);padding:8px 0 4px;}

function render(){

  var html='';
  VERSIONS.forEach(function(v,idx){
    var isLatest=idx===0;
    if(isLatest){
      html+='<div class="ver-card latest"><div class="ver-hero"><div class="ver-hero-icon">🚀</div><div class="ver-hero-right"><div class="ver-hero-label">Current Version</div><div class="ver-hero-num">v'+v.version+'</div><div class="ver-hero-date">'+v.date+'</div></div></div>';
    } else {
      html+='<div class="ver-card"><div class="ver-head"><div class="ver-num">v'+v.version+'</div><div class="ver-date-label">'+v.date+'</div></div>';
    }
    html+='<div class="ver-items">';
    v.items.forEach(function(item){
      html+='<div class="ver-item"><div class="ver-item-icon">'+item.icon+'</div><div class="ver-item-text">'+item.text+'</div></div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

<script>
// バージョンチェック（iOS PWA強制更新対応）
function checkVersion(){
  fetch('./version.json?_='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache,no-store'}})
  .then(function(r){return r.json();})
  .then(function(data){
    var sv=String(data.version);
    var lv=localStorage.getItem('st_app_version');
    if(lv&&lv!==sv){
      localStorage.setItem('st_app_version',sv);
      if('caches' in window){
        caches.keys().then(function(keys){
          Promise.all(keys.map(function(k){return caches.delete(k);}))
            .then(function(){window.location.reload(true);});
        });
      } else { window.location.reload(true); }
    } else { localStorage.setItem('st_app_version',sv); }
  }).catch(function(){});
}
checkVersion();
document.addEventListener('visibilitychange',function(){if(!document.hidden)checkVersion();});
</script>
