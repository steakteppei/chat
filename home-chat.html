<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Teppei Chat">
<meta name="theme-color" content="#1a0f08">
<title>Steak Teppei Chat</title>
<style>
:root {
  --bg:#1a1410;--bg2:#150e08;--bg3:#2d1b0e;
  --accent:#8B4513;--accent2:#cc5500;--gold:#f0c080;
  --text:#e8d4b8;--text3:#9a7a5a;--text4:#6b4a2a;
  --border:#3d2510;--border2:#4a2e15;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans JP','Noto Sans SC',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top)+20px) 24px calc(var(--safe-bottom)+20px);}
.logo{width:80px;height:80px;background:linear-gradient(145deg,#8B4513,#cc3300);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 8px 32px rgba(139,69,19,.5);}
h1{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px;}
.version-note{font-size:11px;color:var(--text3);margin-bottom:32px;}
.launch-btn{display:block;width:100%;max-width:320px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;text-decoration:none;border-radius:16px;text-align:center;font-size:16px;font-weight:600;margin-bottom:12px;}
.ver-link{font-size:11px;color:var(--text4);text-decoration:none;margin-bottom:32px;display:block;text-align:center;}
.changelog{width:100%;max-width:320px;background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:16px;}
.changelog h2{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text4);margin-bottom:12px;}
.log-entry{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.log-entry:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.log-ver{font-size:12px;font-weight:600;color:var(--gold);}
.log-date{font-size:10px;color:var(--text4);margin-left:6px;}
.log-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;}
/* update toast */
#update-toast{display:none;position:fixed;top:calc(var(--safe-top)+12px);left:50%;transform:translateX(-50%);background:var(--accent);color:white;font-size:12px;padding:8px 18px;border-radius:20px;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);}
</style>
</head>
<body>

<div id="update-toast">🔄 Updated! Reloading...</div>

<div class="logo">🥩</div>
<h1>STEAK TEPPEI</h1>
<p class="version-note" id="ver-note"></p>
<a class="launch-btn" href="./index.html">Open Chat →</a>
<a class="ver-link" href="./version-chat.html">Version history</a>
<div class="changelog" id="changelog"></div>

<script>
// ============================================================
const APP_VERSION  = '1.6';
const APP_DATETIME = '__CHAT_DATETIME__';
const CHANGELOG = [
  { ver:'1.6', date:'2026-04-12', desc:'Fix: Switch translation model to gemini-2.5-flash (gemini-2.5-flash-lite not available on this API key)' },
  { ver:'1.5', date:'2026-04-12', desc:'Add force-update mechanism via Service Worker (network-first + auto reload)' },
  { ver:'1.4', date:'2026-04-12', desc:'Fix: Gemini 2.5 Flash-Lite thinkingBudget:0 to resolve translation failure' },
  { ver:'1.3', date:'2026-04-12', desc:'Fix: Gemini model name corrected to gemini-2.5-flash-lite (stable)' },
  { ver:'1.2', date:'2026-04-12', desc:'Switch image storage: Firebase Storage → Cloudinary (25GB free)' },
  { ver:'1.1', date:'2026-04-12', desc:'Add image upload + lightbox feature' },
  { ver:'1.0', date:'2026-04-12', desc:'Initial release: PIN login, Firebase Realtime DB, Gemini translation' },
];
// ============================================================

// Version note
document.getElementById('ver-note').textContent = `v${APP_VERSION} · ${APP_DATETIME}`;

// Changelog
const box = document.getElementById('changelog');
box.innerHTML = '<h2>Changelog</h2>' + CHANGELOG.map(e => `
  <div class="log-entry">
    <span class="log-ver">v${e.ver}</span><span class="log-date">${e.date}</span>
    <div class="log-desc">${e.desc}</div>
  </div>`).join('');

// ── Service Worker: register + force update ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw-chat.js').then(reg => {

    // If a new SW is waiting, activate it immediately
    if (reg.waiting) {
      reg.waiting.postMessage('skipWaiting');
    }

    // When a new SW installs while page is open
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // New version available: skip waiting and reload
          newWorker.postMessage('skipWaiting');
        }
      });
    });
  });

  // When SW controller changes (new SW took over) → reload page
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      document.getElementById('update-toast').style.display = 'block';
      setTimeout(() => location.reload(true), 1200);
    }
  });
}
</script>
</body>
</html>
