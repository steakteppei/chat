<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Steak Teppei Chat</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --blue: #007AFF;
  --blue-dark: #0062CC;
  --gray-bg: #F2F2F7;
  --gray-bubble: #E5E5EA;
  --gray-mid: #8E8E93;
  --gray-light: #C7C7CC;
  --text: #000000;
  --text-sub: #3C3C43;
  --text-muted: #8E8E93;
  --border: #C6C6C8;
  --white: #FFFFFF;
  --red: #FF3B30;
  --green: #34C759;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--gray-bg);
  color: var(--text);
  font-family: 'Noto Sans JP', 'Noto Sans SC', -apple-system, 'Helvetica Neue', sans-serif;
  overflow: hidden;
  position: fixed;
  width: 100%;
  -webkit-font-smoothing: antialiased;
}

.screen { display: none; flex-direction: column; height: 100%; }
.screen.active { display: flex; }

/* ── LOGIN ── */
#screen-login {
  background: var(--gray-bg);
  justify-content: center;
  align-items: center;
  padding: calc(var(--safe-top) + 20px) 32px calc(var(--safe-bottom) + 20px);
}

.login-logo {
  width: 80px; height: 80px;
  background: linear-gradient(145deg, #FF6B35, #CC3300);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(204,51,0,.25);
}

.login-title {
  font-size: 24px; font-weight: 600;
  color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px;
}

.login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 40px; }

.pin-box {
  width: 100%; max-width: 320px;
  background: var(--white);
  border-radius: 18px;
  padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}

.pin-label { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; }

.pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 28px; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--gray-light); transition: all .15s;
}
.pin-dot.filled { background: var(--blue); transform: scale(1.1); }
.pin-dot.error { background: var(--red); }

.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.num-btn {
  height: 60px;
  background: var(--gray-bg);
  border: none;
  border-radius: 14px;
  color: var(--text);
  font-size: 22px; font-weight: 400;
  cursor: pointer; font-family: inherit;
  transition: all .1s;
  display: flex; align-items: center; justify-content: center;
}
.num-btn:active { background: var(--gray-light); transform: scale(.96); }
.num-btn.del { font-size: 18px; color: var(--text-sub); }
.num-btn.empty { background: transparent; cursor: default; }
.login-error { font-size: 12px; color: var(--red); text-align: center; margin-top: 12px; min-height: 16px; }

/* ── CHAT ── */
#screen-chat { background: var(--white); }

.chat-header {
  background: var(--white);
  border-bottom: 0.5px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

.ch-av {
  width: 36px; height: 36px;
  background: linear-gradient(145deg, #FF6B35, #CC3300);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.ch-info { flex: 1; }
.ch-info h2 { font-size: 15px; font-weight: 600; color: var(--text); }
.ch-info p { font-size: 11px; color: var(--text-muted); }

.logout-btn {
  background: none; border: none;
  color: var(--blue); font-size: 14px;
  cursor: pointer; font-family: inherit; padding: 4px 0;
}

/* messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px 6px;
  display: flex; flex-direction: column; gap: 4px;
  -webkit-overflow-scrolling: touch;
  background: var(--white);
}

.sys-row {
  text-align: center; font-size: 11px;
  color: var(--text-muted); padding: 6px 0;
}

.msg-wrap { display: flex; gap: 6px; align-items: flex-end; margin: 2px 0; }
.msg-wrap.own { flex-direction: row-reverse; }

.msg-av {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; flex-shrink: 0;
  margin-bottom: 2px;
}

.msg-body { max-width: 72%; }

.msg-meta {
  font-size: 10px; color: var(--text-muted);
  margin-bottom: 2px; display: flex; align-items: center; gap: 4px;
  padding: 0 4px;
}
.msg-wrap.own .msg-meta { flex-direction: row-reverse; }

.bubble {
  padding: 9px 13px;
  font-size: 15px; line-height: 1.5;
  word-break: break-word;
  border-radius: 18px;
  position: relative;
}

/* other person bubble */
.msg-wrap:not(.own) .bubble {
  background: var(--gray-bubble);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

/* own bubble - iMessage blue */
.msg-wrap.own .bubble {
  background: var(--blue);
  color: var(--white);
  border-bottom-right-radius: 4px;
}

.msg-image {
  max-width: 220px; width: 100%;
  border-radius: 14px; display: block;
  margin-bottom: 2px; cursor: pointer;
}
.bubble.image-only { padding: 4px; background: transparent !important; }
.msg-wrap.own .bubble.image-only { background: transparent !important; }

.orig-text {
  font-size: 10px; color: var(--text-muted);
  margin-top: 3px; padding: 0 4px;
  line-height: 1.4;
}

.trans-block { margin-top: 3px; display: flex; flex-direction: column; gap: 1px; }
.trans-item {
  font-size: 10px; color: var(--text-muted);
  padding: 2px 4px; line-height: 1.5;
}
.trans-lbl { margin-right: 3px; }

/* typing indicator */
.typing-dots {
  display: inline-flex; gap: 4px; align-items: center;
  padding: 10px 14px;
  background: var(--gray-bubble);
  border-radius: 18px; border-bottom-left-radius: 4px;
}
.typing-dots span {
  width: 6px; height: 6px; background: var(--gray-mid);
  border-radius: 50%; animation: tdot 1.4s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── INPUT BAR ── */
.input-bar {
  background: var(--white);
  border-top: 0.5px solid var(--border);
  padding: 8px 12px calc(var(--safe-bottom) + 8px);
  flex-shrink: 0;
}

#img-preview-wrap {
  display: none; margin-bottom: 8px;
  position: relative; width: fit-content;
}
#img-preview {
  width: 72px; height: 72px; object-fit: cover;
  border-radius: 12px; border: 0.5px solid var(--border);
}
#img-remove {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px;
  background: var(--gray-mid); border: none; border-radius: 50%;
  color: white; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.input-row { display: flex; gap: 8px; align-items: flex-end; }

.icon-btn {
  width: 34px; height: 34px;
  background: none; border: none;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; color: var(--blue);
  transition: opacity .1s;
}
.icon-btn:active { opacity: .6; }

#msg-input {
  flex: 1;
  background: var(--gray-bg);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  outline: none;
  resize: none;
  max-height: 120px; min-height: 36px;
  line-height: 1.4;
  -webkit-appearance: none;
}
#msg-input:focus { border-color: var(--blue); background: var(--white); }
#msg-input::placeholder { color: var(--gray-light); }

#send-btn {
  width: 34px; height: 34px;
  background: var(--blue);
  border: none; border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .1s;
  -webkit-appearance: none;
}
#send-btn:active { transform: scale(.92); background: var(--blue-dark); }
#send-btn:disabled { background: var(--gray-light); }
#send-btn svg { width: 16px; height: 16px; fill: white; }

/* upload progress */
#upload-progress {
  display: none; font-size: 11px; color: var(--text-muted);
  text-align: center; padding: 4px 0;
}
.progress-bar { height: 2px; background: var(--gray-light); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; width: 0%; }

/* ── EMOJI PICKER ── */
#emoji-panel {
  display: none;
  background: var(--white);
  border-top: 0.5px solid var(--border);
  padding: 10px 8px 6px;
  flex-shrink: 0;
}
#emoji-panel.open { display: block; }

.emoji-tabs {
  display: flex; gap: 2px; margin-bottom: 8px;
  border-bottom: 0.5px solid var(--border);
  padding-bottom: 6px;
}
.emoji-tab {
  flex: 1; background: none; border: none;
  font-size: 18px; padding: 4px 0; cursor: pointer;
  border-radius: 6px; transition: background .1s;
}
.emoji-tab.active { background: var(--gray-bg); }
.emoji-tab:active { background: var(--gray-light); }

.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
  max-height: 160px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.emoji-btn {
  background: none; border: none;
  font-size: 24px; padding: 6px 2px;
  cursor: pointer; border-radius: 8px;
  transition: background .1s;
  line-height: 1;
}
.emoji-btn:active { background: var(--gray-bg); }

/* ── LIGHTBOX ── */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.9); z-index: 1000;
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
#lightbox-close {
  position: absolute; top: calc(var(--safe-top) + 14px); right: 16px;
  background: rgba(255,255,255,.2); border: none;
  color: white; font-size: 20px; width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* conn / install */
#conn-status {
  font-size: 11px; padding: 4px 10px; text-align: center;
  background: #FFF3CD; color: #856404; display: none; flex-shrink: 0;
}
#install-banner {
  display: none; background: #EBF5FF;
  border-bottom: 0.5px solid #B3D7FF;
  padding: 8px 14px; align-items: center; gap: 8px;
  font-size: 12px; color: var(--blue); flex-shrink: 0;
}
.ib-btn {
  background: var(--blue); color: white; border: none;
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  font-family: inherit; cursor: pointer; margin-left: auto;
}
.ib-close { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }
</style>
</head>

  { icon:'😸', label:'Animals', emojis:['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐝','🪱','🐛','🦋','🐌','🐞','🐜','🪲','🦟','🦗','🕷','🦂','🐢','🐍','🦎','🐊'] },
];

let currentUser  = null;
let pinBuffer    = '';
let selectedFile = null;
let shownIds     = new Set();
let listening    = false;
let emojiOpen    = false;
let activeEmojiCat = 0;

const fbApp   = initializeApp(firebaseConfig);
const db      = getDatabase(fbApp);
const msgsRef = ref(db, 'messages');

const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const show = id => { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); };

// ── Build emoji picker ──
function buildEmojiPicker() {
  const tabs  = document.getElementById('emoji-tabs');
  const grid  = document.getElementById('emoji-grid');

  EMOJI_CATS.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'emoji-tab' + (i===0?' active':'');
    btn.textContent = cat.icon;
    btn.title = cat.label;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      activeEmojiCat = i;
      renderEmojiGrid(i);
    };
    tabs.appendChild(btn);
  });
  renderEmojiGrid(0);
}

function renderEmojiGrid(catIdx) {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJI_CATS[catIdx].emojis.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = em;
    btn.onclick = () => insertEmoji(em);
    grid.appendChild(btn);
  });
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end   = input.selectionEnd;
  const val   = input.value;
  input.value = val.slice(0,start) + emoji + val.slice(end);
  input.setSelectionRange(start + emoji.length, start + emoji.length);
  input.focus();
  input.dispatchEvent(new Event('input'));
}

window.toggleEmoji = function() {
  emojiOpen = !emojiOpen;
  const panel = document.getElementById('emoji-panel');
  panel.classList.toggle('open', emojiOpen);
  document.getElementById('emoji-toggle-btn').style.color = emojiOpen ? '#FF9500' : '#007AFF';
  if (!emojiOpen) document.getElementById('msg-input').focus();
  scrollBottom();
};

// ── PIN ──
window.pinInput = d => {
  if (pinBuffer.length >= 6) return;
  pinBuffer += d;
  updateDots();
  if (pinBuffer.length === 6) setTimeout(checkPin, 80);
};
window.pinDelete = () => {
  pinBuffer = pinBuffer.slice(0,-1);
  updateDots();
  document.getElementById('login-error').textContent = '';
  document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));
};
function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) => {
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('error');
  });
}
function checkPin() {
  const m = MEMBERS[pinBuffer];
  if (m) {
    currentUser = m;
    localStorage.setItem(USER_KEY, pinBuffer);
    pinBuffer = ''; updateDots();
    document.getElementById('login-error').textContent = '';
    enterChat();
  } else {
    document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
    document.getElementById('login-error').textContent = 'Incorrect PIN. Try again.';
    setTimeout(() => {
      pinBuffer = ''; updateDots();
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));
      document.getElementById('login-error').textContent = '';
    }, 1000);
  }
}

function enterChat() {
  document.getElementById('msg-input').placeholder = PLACEHOLDERS[currentUser.lang];
  show('screen-chat');
  listenMessages();
  if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('ib_dismissed')) {
    document.getElementById('install-banner').style.display = 'flex';
  }
}

window.logout = () => {
  currentUser = null;
  localStorage.removeItem(USER_KEY);
  document.getElementById('messages').querySelectorAll('.msg-wrap').forEach(e=>e.remove());
  shownIds.clear(); listening = false;
  removeImage();
  if (emojiOpen) toggleEmoji();
  show('screen-login');
};
window.dismissBanner    = () => { localStorage.setItem('ib_dismissed','1'); document.getElementById('install-banner').style.display='none'; };
window.showInstallGuide = () => { dismissBanner(); alert('[ iPhone / Safari ]\nTap Share (□↑) → "Add to Home Screen"\n\n[ iPhone ]\n共有（□↑）→「ホーム画面に追加」'); };

// ── Image ──
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

window.removeImage = () => {
  selectedFile = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-preview').src = '';
};

async function uploadImage(file) {
  document.getElementById('upload-progress').style.display = 'block';
  document.getElementById('progress-fill').style.width = '30%';
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'teppei-chat');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:formData });
  document.getElementById('progress-fill').style.width = '100%';
  setTimeout(() => { document.getElementById('upload-progress').style.display='none'; document.getElementById('progress-fill').style.width='0%'; }, 400);
  if (!res.ok) throw new Error('Cloudinary upload failed');
  const data = await res.json();
  return data.secure_url.replace('/upload/', '/upload/q_auto,f_auto,w_800/');
}

// ── Firebase ──
function listenMessages() {
  if (listening) return;
  listening = true;
  onValue(ref(db,'.info/connected'), snap => {
    document.getElementById('conn-status').style.display = snap.val() ? 'none' : 'block';
  });
  onChildAdded(msgsRef, snap => {
    const msg = snap.val();
    if (!msg || shownIds.has(snap.key)) return;
    shownIds.add(snap.key);
    renderMessage(msg);
    scrollBottom();
  });
}

// ── Render ──
function renderMessage(msg) {
  if (!currentUser) return;
  const vLang   = currentUser.lang;
  const isOwn   = msg.uid === currentUser.id;
  const mainTxt = isOwn ? msg.orig : (msg.tr?.[vLang] || msg.orig);
  const others  = msg.tr
    ? Object.entries(msg.tr).filter(([l,t]) => l!==msg.sLang && l!==vLang && t && t!==msg.orig)
    : [];
  const time     = new Date(msg.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  const showOrig = !isOwn && msg.sLang !== vLang && msg.orig;
  const transHtml = others.map(([l,t]) => `<div class="trans-item"><span class="trans-lbl">${LANG_FLAGS[l]}</span>${esc(t)}</div>`).join('');
  const m = Object.values(MEMBERS).find(x=>x.id===msg.uid) || { bg:'#8E8E93', fg:'#FFF', initials:'?' };
  const hasImage = !!msg.imageUrl;
  const hasText  = !!(mainTxt && mainTxt.trim());

  let bubbleContent = '';
  if (hasImage) bubbleContent += `<img class="msg-image" src="${msg.imageUrl}" alt="photo" onclick="openLightbox('${msg.imageUrl}')">`;
  if (hasText)  bubbleContent += esc(mainTxt);

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap' + (isOwn?' own':'');
  wrap.innerHTML = `
    ${!isOwn ? `<div class="msg-av" style="background:${m.bg};color:${m.fg};">${m.initials}</div>` : ''}
    <div class="msg-body">
      <div class="msg-meta">
        ${!isOwn ? `<span style="font-weight:500;color:#000;">${m.initials}</span>` : ''}
        <span>${LANG_FLAGS[msg.sLang]}</span>
        <span>${time}</span>
      </div>
      <div class="bubble${hasImage&&!hasText?' image-only':''}">${bubbleContent}</div>
      ${showOrig&&hasText ? `<div class="orig-text">${esc(msg.orig)}</div>` : ''}
      ${transHtml ? `<div class="trans-block">${transHtml}</div>` : ''}
    </div>`;
  document.getElementById('messages').appendChild(wrap);
}

function scrollBottom() {
  setTimeout(()=>{ const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; },60);
}

window.openLightbox  = url => { document.getElementById('lightbox-img').src=url; document.getElementById('lightbox').classList.add('open'); };
window.closeLightbox = ()  => { document.getElementById('lightbox').classList.remove('open'); };

// ── Translate via Cloudflare Worker ──
async function translate(text, srcLang, targetLangs) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, srcLang, targetLangs })
  });
  if (!res.ok) throw new Error('Worker error ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.translations;
}

// ── Send ──
async function sendMessage() {
  if (!currentUser) return;
  const input  = document.getElementById('msg-input');
  const text   = input.value.trim();
  const hasImg = !!selectedFile;
  if (!text && !hasImg) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  if (emojiOpen) toggleEmoji();

  try {
    let imageUrl = null;
    if (hasImg) { imageUrl = await uploadImage(selectedFile); removeImage(); }

    let tr = {};
    if (text) {
      const targets = ['ja','en','zh'].filter(l=>l!==currentUser.lang);
      try { tr = await translate(text, currentUser.lang, targets); } catch(e) { console.error('Translation error:', e); }
      tr[currentUser.lang] = text;
    }

    const payload = { uid: currentUser.id, sLang: currentUser.lang, orig: text||'', tr, ts: Date.now() };
    if (imageUrl) payload.imageUrl = imageUrl;
    await push(msgsRef, payload);

  } catch(e) {
    console.error('Send error:', e);
    alert('Failed to send. Please try again.');
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.getElementById('msg-input').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
document.getElementById('msg-input').addEventListener('focus', () => {
  if (emojiOpen) { emojiOpen=false; document.getElementById('emoji-panel').classList.remove('open'); document.getElementById('emoji-toggle-btn').style.color='#007AFF'; }
  setTimeout(scrollBottom, 300);
});
document.body.addEventListener('touchmove',e=>{
  if(e.target.closest('#messages,.emoji-grid'))return;
  e.preventDefault();
},{passive:false});

// ── Version display ──
document.getElementById('ver-display').textContent = 'v' + CHAT_VERSION;

// ── Build emoji ──
buildEmojiPicker();

// ── Auto-login ──
const saved = localStorage.getItem(USER_KEY);
if (saved && MEMBERS[saved]) { currentUser = MEMBERS[saved]; enterChat(); }
</script>
